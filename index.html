<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명지 창업 아이디어 모의 투자 투표</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { font-family: 'Jua', sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(12px); }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    .animate-shimmer { animation: shimmer 2s infinite; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20 min-h-screen">
  <div id="app"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxduMg1yfs-m06WAOqbI7mTamKN876bNnY3H_mTl9ZTXtYS1iq6YdvDuhH2vE9k0QDJrw/exec";

    const STORAGE_UID = "myeongji_uid";
    const STORAGE_VOTE = "myeongji_my_vote";
    const TOTAL_BUDGET = 10000000;
    const UNIT = 1000000;
    const TEAMS = Array.from({ length: 10 }, (_, i) => ({ id: i + 1, name: `${i + 1}반` }));

    const state = {
      userId: localStorage.getItem(STORAGE_UID) || `user_${Math.random().toString(36).slice(2, 11)}`,
      step: "intro",
      myClass: null,
      investments: {},
      globalTotals: {},
      votedClasses: {},
      votedClassList: [],
      voteCount: 0,
      electionId: null,
      loading: true,
      submitting: false,
      errorMsg: null,
      pollingInterval: null,
      status: "OPEN",
      updatedAt: null,
      admin: {
        visible: false,
        unlocked: false,
        pin: "",
        busy: false,
        message: ""
      }
    };

    localStorage.setItem(STORAGE_UID, state.userId);

    async function init() {
      await loadGlobalState();
      restoreSavedVote();

      state.loading = false;
      render();

      state.pollingInterval = setInterval(async () => {
        await loadGlobalState();
        render();
      }, 5000);
    }

    async function loadGlobalState() {
      try {
        const res = await fetch(`${GAS_URL}?t=${Date.now()}`);
        if (!res.ok) throw new Error("서버 응답이 올바르지 않습니다.");

        const data = await res.json();
        applyServerState(data);
      } catch (error) {
        console.error("데이터 로드 실패:", error);
      }
    }

    function applyServerState(data) {
      const serverState = data.state || data;
      state.globalTotals = serverState.totals || {};
      state.votedClasses = serverState.votedClasses || {};
      state.votedClassList = serverState.votedClassList || [];
      state.voteCount = Number(serverState.voteCount || 0);
      state.status = serverState.status || "OPEN";
      state.electionId = serverState.electionId || null;
      state.updatedAt = serverState.updatedAt || null;
    }

    function restoreSavedVote() {
      const savedVote = localStorage.getItem(STORAGE_VOTE);
      if (!savedVote) return;

      try {
        const parsed = JSON.parse(savedVote);
        if (parsed.electionId !== state.electionId) {
          localStorage.removeItem(STORAGE_VOTE);
          return;
        }

        state.myClass = Number(parsed.myClass);
        state.investments = parsed.investments || {};
        state.step = "result";
      } catch (error) {
        localStorage.removeItem(STORAGE_VOTE);
      }
    }

    window.formatMoney = (num) => {
      const amount = Number(num || 0);
      if (!amount) return "0원";
      return `${(amount / 10000).toLocaleString()}만원`;
    };

    function getSelectedInvestments() {
      return Object.fromEntries(
        Object.entries(state.investments).filter(([, amount]) => Number(amount) > 0)
      );
    }

    function classHasVoted(classNum) {
      return Boolean(state.votedClasses[String(classNum)] || state.votedClasses[classNum]);
    }

    window.handleStart = (classNum) => {
      if (state.status === "CLOSED") {
        alert("투표가 이미 마감되었습니다.");
        return;
      }

      if (classHasVoted(classNum)) {
        alert(`${classNum}반은 이미 투표를 완료했습니다.`);
        return;
      }

      state.myClass = classNum;
      state.investments = {};
      state.errorMsg = null;
      state.step = "vote";
      render();
    };

    window.goBackToIntro = () => {
      state.step = "intro";
      state.investments = {};
      state.errorMsg = null;
      render();
    };

    window.goToEdit = () => {
      if (state.status === "CLOSED") {
        alert("투표가 마감되어 수정할 수 없습니다.");
        return;
      }
      state.errorMsg = null;
      state.step = "vote";
      render();
    };

    window.handleInvest = (teamId, amount) => {
      if (teamId === state.myClass) return;

      const current = Number(state.investments[teamId] || 0);
      const newValue = current + amount;
      if (newValue < 0) return;

      const tempInvestments = { ...state.investments };
      if (newValue === 0) {
        delete tempInvestments[teamId];
      } else {
        tempInvestments[teamId] = newValue;
      }

      const investedTeamsCount = Object.values(tempInvestments).filter((value) => value > 0).length;
      if (investedTeamsCount > 3) return;

      const totalInvested = Object.values(tempInvestments).reduce((a, b) => a + Number(b), 0);
      if (totalInvested > TOTAL_BUDGET) return;

      state.investments = tempInvestments;
      render();
    };

    window.handleSubmitVote = async () => {
      state.submitting = true;
      state.errorMsg = null;
      render();

      try {
        const payload = {
          action: "vote",
          userId: state.userId,
          myClass: state.myClass,
          investments: getSelectedInvestments()
        };

        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (result.state) {
          applyServerState(result.state);
        }

        if (result.error) {
          state.errorMsg = result.error;
          await loadGlobalState();
          return;
        }

        if (result.result === "success") {
          localStorage.setItem(STORAGE_VOTE, JSON.stringify({
            electionId: result.electionId || state.electionId,
            myClass: state.myClass,
            investments: getSelectedInvestments()
          }));

          await loadGlobalState();
          state.step = "result";
        }
      } catch (error) {
        state.errorMsg = "네트워크 오류가 발생했습니다. 잠시 뒤 다시 시도해주세요.";
      } finally {
        state.submitting = false;
        render();
      }
    };

    window.toggleAdmin = () => {
      state.admin.visible = !state.admin.visible;
      state.admin.message = "";
      render();
    };

    window.updateAdminPin = (value) => {
      state.admin.pin = value;
    };

    window.adminUnlock = async () => {
      if (!state.admin.pin.trim()) {
        state.admin.message = "비밀번호를 입력해주세요.";
        render();
        return;
      }

      state.admin.busy = true;
      state.admin.message = "";
      render();

      try {
        const result = await postAdminCommand("status");
        if (result.error) throw new Error(result.error);

        state.admin.unlocked = true;
        state.admin.message = "관리자 모드가 열렸습니다.";
        if (result.state) applyServerState(result.state);
      } catch (error) {
        state.admin.unlocked = false;
        state.admin.message = error.message || "관리자 인증에 실패했습니다.";
      } finally {
        state.admin.busy = false;
        render();
      }
    };

    window.adminCommand = async (cmd) => {
      const messages = {
        close: "투표를 마감하고 결과 화면으로 전환할까요?",
        open: "투표를 다시 열까요?",
        dedupe: "같은 반의 중복 기록이 있다면 최신 1건만 남길까요?",
        reset: "모든 투표 데이터를 삭제하고 처음부터 다시 시작할까요? 이 작업은 되돌릴 수 없습니다."
      };

      if (!confirm(messages[cmd] || "실행할까요?")) return;

      state.admin.busy = true;
      state.admin.message = "";
      render();

      try {
        const result = await postAdminCommand(cmd);
        if (result.error) throw new Error(result.error);

        if (result.state) applyServerState(result.state);

        if (cmd === "reset") {
          localStorage.removeItem(STORAGE_VOTE);
          state.step = "intro";
          state.myClass = null;
          state.investments = {};
        }

        if (cmd === "close") {
          state.step = "result";
        }

        const doneText = {
          close: "투표를 마감했습니다.",
          open: "투표를 다시 열었습니다.",
          dedupe: "중복 기록을 정리했습니다.",
          reset: "투표를 초기화했습니다."
        };
        state.admin.message = doneText[cmd] || "처리했습니다.";
      } catch (error) {
        state.admin.message = error.message || "처리 중 오류가 발생했습니다.";
      } finally {
        state.admin.busy = false;
        render();
      }
    };

    async function postAdminCommand(cmd) {
      const response = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: "admin",
          cmd,
          pin: state.admin.pin
        })
      });

      return response.json();
    }

    function render() {
      const appDiv = document.getElementById("app");

      if (state.loading) {
        appDiv.innerHTML = `
          <div class="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div class="animate-pulse flex flex-col items-center">
              <i class="fa-solid fa-chart-simple text-5xl mb-4 text-blue-500"></i>
              <h2 class="text-3xl font-bold text-blue-600 drop-shadow-sm">데이터를 불러오는 중...</h2>
            </div>
          </div>
        `;
        return;
      }

      let html = `
        <header class="bg-gradient-to-r from-blue-500 to-emerald-500 text-white p-6 shadow-md rounded-b-2xl text-center">
          <p class="text-sm md:text-base font-light text-blue-50 mb-1 opacity-95">"우리 마을에 가장 필요한 창업 아이디어는?"</p>
          <h1 class="text-2xl md:text-4xl font-bold drop-shadow-md flex items-center justify-center gap-3">
            <i class="fa-solid fa-chart-simple text-yellow-200"></i>
            명지 창업 아이디어 모의 투자 투표
          </h1>
        </header>
        <main class="max-w-4xl mx-auto mt-8 px-4 relative">
      `;

      if (state.step === "intro") html += renderIntro();
      if (state.step === "vote") html += renderVote();
      if (state.step === "result") html += renderResult();

      html += `</main>`;
      html += renderAdminPanel();
      appDiv.innerHTML = html;
    }

    function renderIntro() {
      const closedBanner = state.status === "CLOSED" ? `
        <div class="bg-red-100 text-red-600 p-4 rounded-lg mb-6 font-bold text-lg border-2 border-red-200">
          현재 투표가 마감되었습니다.
        </div>
      ` : "";

      const votedSummary = state.votedClassList.length > 0 ? `
        <div class="mb-6 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-lg p-4">
          <div class="font-bold mb-2">투표 완료 반</div>
          <div class="flex flex-wrap justify-center gap-2">
            ${state.votedClassList.map((num) => `<span class="px-3 py-1 bg-white rounded-full border border-emerald-100">${num}반</span>`).join("")}
          </div>
        </div>
      ` : "";

      const buttonsHtml = TEAMS.map((team) => {
        const alreadyVoted = classHasVoted(team.id);
        const disabled = state.status === "CLOSED" || alreadyVoted;
        const buttonClass = disabled
          ? "bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed"
          : "bg-white hover:bg-blue-50 hover:text-blue-600 border-slate-200 shadow-sm";
        const label = alreadyVoted ? `${team.id}반 완료` : `${team.id}반`;

        return `
          <button
            onclick="handleStart(${team.id})"
            ${disabled ? "disabled" : ""}
            class="min-h-14 py-3 rounded-lg transition-colors font-bold text-base border ${buttonClass}">
            ${label}
          </button>
        `;
      }).join("");

      return `
        <section class="bg-white rounded-lg shadow-xl p-6 md:p-8 text-center animate-fade-in">
          <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-6 drop-shadow-md block"></i>
          <h2 class="text-3xl mb-4 text-slate-700">우리 동네를 바꿀 창업 아이디어를 골라주세요</h2>
          <p class="text-lg text-slate-500 mb-8 leading-relaxed">
            여러분에게는 <strong>1,000만원</strong>의 투자금이 주어집니다.<br>
            본인 반을 제외하고 <span class="text-blue-500">정확히 3개 반</span>에 금액을 다르게 나누어 투자해주세요.
          </p>

          ${closedBanner}
          ${votedSummary}

          <div class="max-w-md mx-auto">
            <label class="text-left text-lg mb-3 text-slate-600 flex items-center gap-2">
              <i class="fa-solid fa-users"></i> 소속 반을 선택해주세요
            </label>
            <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-4">
              ${buttonsHtml}
            </div>
            <p class="text-sm text-slate-400">이미 투표를 완료한 반은 다시 선택할 수 없습니다.</p>
          </div>
        </section>
      `;
    }

    function renderVote() {
      const currentTotal = Object.values(state.investments).reduce((a, b) => a + Number(b), 0);
      const remainingBudget = TOTAL_BUDGET - currentTotal;
      const investedAmounts = Object.values(state.investments).filter((value) => value > 0);
      const investedTeamsCount = investedAmounts.length;
      const hasUniqueAmounts = new Set(investedAmounts).size === investedTeamsCount;
      const canSubmit = investedTeamsCount === 3 && remainingBudget === 0 && hasUniqueAmounts && !state.submitting;
      const isMaxTeamsReached = investedTeamsCount >= 3;

      const teamsHtml = TEAMS.map((team) => {
        const isMyClass = team.id === state.myClass;
        const currentInv = Number(state.investments[team.id] || 0);
        const disablePlus = isMyClass || remainingBudget < UNIT || (currentInv === 0 && isMaxTeamsReached) || state.submitting;
        const disableMinus = isMyClass || currentInv === 0 || state.submitting;

        return `
          <article class="bg-white rounded-lg p-5 shadow-md border-2 transition-all flex flex-col justify-between
            ${isMyClass ? "border-slate-200 opacity-60 bg-slate-50" : "border-transparent hover:shadow-lg hover:border-blue-200"}
            ${currentInv > 0 ? "border-blue-400 bg-blue-50" : ""}">
            <div class="flex justify-between items-start mb-6">
              <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-xl font-bold">${team.name}</div>
              ${isMyClass ? `<span class="text-red-400 text-sm font-bold flex items-center gap-1"><i class="fa-solid fa-ban"></i> 본인 반</span>` : ""}
            </div>
            <div class="bg-slate-100 rounded-lg p-4 flex items-center justify-between mt-auto">
              <button onclick="handleInvest(${team.id}, ${-UNIT})" ${disableMinus ? "disabled" : ""} class="w-12 h-12 rounded-full bg-white shadow flex items-center justify-center text-3xl font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-30 transition-transform active:scale-95" aria-label="${team.name} 투자금 줄이기">-</button>
              <div class="text-center flex-1">
                <span class="text-xs text-slate-400 block mb-1">나의 투자금</span>
                <span class="text-2xl font-bold ${currentInv > 0 ? "text-blue-600" : "text-slate-600"}">${window.formatMoney(currentInv)}</span>
              </div>
              <button onclick="handleInvest(${team.id}, ${UNIT})" ${disablePlus ? "disabled" : ""} class="w-12 h-12 rounded-full bg-blue-500 shadow flex items-center justify-center text-3xl font-bold text-white hover:bg-blue-600 disabled:opacity-30 transition-transform active:scale-95" aria-label="${team.name} 투자금 늘리기">+</button>
            </div>
          </article>
        `;
      }).join("");

      const warningHtml = (remainingBudget === 0 && investedTeamsCount === 3 && !hasUniqueAmounts) ? `
        <div class="bg-red-100 border border-red-300 text-red-600 p-3 rounded-lg mt-4 text-center font-bold text-sm md:text-base">
          투자 금액이 같은 반이 있습니다. 1위, 2위, 3위가 나뉘도록 금액을 다르게 배분해주세요. 예: 500만원, 300만원, 200만원
        </div>
      ` : "";

      const errorHtml = state.errorMsg ? `<div class="bg-red-100 text-red-600 p-3 rounded-lg mt-4 text-center font-bold">${state.errorMsg}</div>` : "";

      return `
        <section class="animate-fade-in">
          <button onclick="goBackToIntro()" class="text-slate-500 hover:text-blue-600 flex items-center gap-2 mb-6 font-bold text-lg transition-colors">
            <i class="fa-solid fa-arrow-left"></i> 다시 반 선택하기
          </button>

          <div class="sticky top-4 z-40 mb-8">
            <div class="glass-panel rounded-lg shadow-lg border-2 border-blue-200 p-4 px-6 flex flex-col md:flex-row items-center justify-between gap-4">
              <div class="flex items-center gap-3 shrink-0">
                <div class="bg-yellow-100 p-2.5 rounded-full w-12 h-12 flex items-center justify-center"><i class="fa-solid fa-wallet text-xl text-yellow-600"></i></div>
                <div class="text-left">
                  <p class="text-xs text-slate-500 whitespace-nowrap">남은 투자금</p>
                  <p class="text-xl md:text-2xl font-bold whitespace-nowrap ${remainingBudget === 0 ? "text-green-500" : "text-blue-600"}">${window.formatMoney(remainingBudget)}</p>
                </div>
              </div>
              <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 text-sm md:text-base text-slate-500 justify-center">
                <div class="flex items-center gap-1.5 whitespace-nowrap ${investedTeamsCount === 3 ? "text-green-600" : ""}"><i class="fa-solid fa-circle-check"></i> 3개 선택 (${investedTeamsCount}/3)</div>
                <div class="flex items-center gap-1.5 whitespace-nowrap ${remainingBudget === 0 ? "text-green-600" : ""}"><i class="fa-solid fa-circle-check"></i> 1,000만원 사용</div>
                <div class="flex items-center gap-1.5 whitespace-nowrap ${(investedTeamsCount > 1 && hasUniqueAmounts) ? "text-green-600" : ""}"><i class="fa-solid fa-circle-check"></i> 금액 차등 분배</div>
              </div>
              <button onclick="handleSubmitVote()" ${!canSubmit ? "disabled" : ""} class="w-full md:w-auto px-6 py-2.5 rounded-full text-lg font-bold transition-all shadow-md flex items-center justify-center gap-2 whitespace-nowrap ${canSubmit ? "bg-gradient-to-r from-blue-500 to-emerald-500 text-white hover:scale-105 active:scale-95" : "bg-slate-200 text-slate-400 cursor-not-allowed"}">
                ${state.submitting ? "제출 중..." : "투자 확정하기"} <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
            ${warningHtml}
            ${errorHtml}
          </div>

          <div class="bg-yellow-50 border border-yellow-200 text-yellow-700 p-4 rounded-lg mb-8 flex items-start gap-3 shadow-sm">
            <i class="fa-solid fa-circle-exclamation text-xl mt-1 shrink-0"></i>
            <p class="text-base md:text-lg">
              <strong>${state.myClass}반</strong> 소속입니다. 본인 반에는 투자할 수 없습니다.<br>
              100만원 단위로 <strong>정확히 3개 반</strong>에 1,000만원을 모두 투자하고, 각 반의 금액은 서로 다르게 정해주세요.
            </p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">${teamsHtml}</div>
        </section>
      `;
    }

    function renderResult() {
      const sortedTeams = TEAMS.map((team) => ({
        ...team,
        total: Number(state.globalTotals[team.id] || 0)
      })).sort((a, b) => b.total - a.total);

      const maxTotal = Math.max(...Object.values(state.globalTotals).map(Number), TOTAL_BUDGET);

      const ranksHtml = sortedTeams.map((team, index) => {
        const percentage = (team.total / (maxTotal || 1)) * 100;
        let rankIcon = `<span class="w-8 h-8 flex items-center justify-center bg-slate-200 rounded-full text-slate-600 font-bold">${index + 1}</span>`;
        let cardStyle = "bg-white border border-slate-100 p-4 rounded-lg shadow-sm mb-4 transition-all";
        let barColor = "bg-gradient-to-r from-blue-400 to-cyan-300";
        let titleColor = "text-lg";
        let amtColor = "text-xl text-blue-600";

        if (index === 0) {
          rankIcon = `<i class="fa-solid fa-trophy text-4xl text-yellow-500 drop-shadow-lg"></i>`;
          cardStyle = "bg-gradient-to-br from-yellow-50 to-white border-2 border-yellow-300 p-6 rounded-lg shadow-lg scale-[1.02] mb-6 z-10 relative";
          barColor = "bg-gradient-to-r from-yellow-400 to-yellow-200";
          titleColor = "text-2xl text-yellow-800 font-black";
          amtColor = "text-3xl text-yellow-600";
        } else if (index === 1) {
          rankIcon = `<i class="fa-solid fa-trophy text-3xl text-slate-400 drop-shadow"></i>`;
          cardStyle = "bg-gradient-to-br from-slate-50 to-white border-2 border-slate-300 p-5 rounded-lg mb-4 shadow-md";
          barColor = "bg-gradient-to-r from-slate-400 to-slate-200";
        } else if (index === 2) {
          rankIcon = `<i class="fa-solid fa-trophy text-3xl text-amber-600 drop-shadow"></i>`;
          cardStyle = "bg-gradient-to-br from-amber-50 to-white border-2 border-amber-200 p-5 rounded-lg mb-4 shadow-md";
          barColor = "bg-gradient-to-r from-amber-500 to-amber-300";
        }

        return `
          <article class="${cardStyle}" style="transition-duration: 800ms">
            <div class="flex items-center gap-4 mb-3">
              <div class="w-10 text-center shrink-0">${rankIcon}</div>
              <div class="flex-1 font-bold text-slate-700 flex justify-between items-center gap-3">
                <span class="${titleColor} whitespace-nowrap">${team.name}</span>
                <span class="font-black ${amtColor} whitespace-nowrap">${window.formatMoney(team.total)}</span>
              </div>
            </div>
            <div class="ml-14 h-4 md:h-6 bg-slate-100 rounded-full overflow-hidden shadow-inner">
              <div class="h-full rounded-full transition-all duration-1000 relative overflow-hidden ${barColor}" style="width: ${Math.max(percentage, 1)}%">
                <div class="absolute top-0 left-0 right-0 bottom-0 bg-white/30 -skew-x-12 translate-x-[-100%] animate-shimmer"></div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      const myInvestments = Object.entries(state.investments).filter(([, amount]) => Number(amount) > 0);
      const myInvestmentsHtml = myInvestments.length > 0
        ? myInvestments.map(([classId, amount]) => `<span class="bg-white px-4 py-2 rounded-full shadow-sm text-slate-700 font-bold border border-blue-100 whitespace-nowrap">${classId}반: <span class="text-blue-600">${window.formatMoney(amount)}</span></span>`).join("")
        : `<span class="text-slate-400">이 기기의 투표 내역이 없습니다.</span>`;

      const isClosed = state.status === "CLOSED";

      return `
        <section class="bg-white rounded-lg shadow-xl p-6 md:p-10 animate-fade-in">
          <div class="text-center mb-10">
            <div class="relative inline-block">
              <i class="fa-solid fa-arrow-trend-up text-6xl text-blue-500 mb-4 animate-pulse drop-shadow-md"></i>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">실시간 투자 현황</h2>
            <p class="text-slate-500">같은 반의 중복 기록은 최신 1건만 집계됩니다.</p>
          </div>

          <div class="space-y-4 relative">${ranksHtml}</div>

          <div class="mt-12 bg-blue-50 text-blue-700 p-6 rounded-lg text-center shadow-inner">
            <i class="fa-solid fa-coins text-4xl mb-2 text-yellow-500 block"></i>
            <p class="text-xl font-bold mb-4">나의 투자 내역</p>
            <div class="flex flex-wrap justify-center gap-3">${myInvestmentsHtml}</div>
          </div>

          ${!isClosed && state.myClass ? `
            <div class="mt-8 text-center">
              <button onclick="goToEdit()" class="inline-flex items-center gap-2 px-6 py-3 bg-white border-2 border-slate-200 rounded-full text-slate-600 font-bold hover:bg-slate-50 hover:text-blue-600 shadow-sm transition-colors">
                <i class="fa-solid fa-pen-to-square"></i> 내 투표 수정하기
              </button>
            </div>
          ` : `
            <div class="mt-8 text-center">
              <p class="${isClosed ? "text-red-500 bg-red-50 border-red-200" : "text-slate-500 bg-slate-50 border-slate-200"} font-bold p-3 rounded-lg border">
                ${isClosed ? "투표가 마감되어 결과가 확정되었습니다." : "반을 선택하면 투표할 수 있습니다."}
              </p>
            </div>
          `}
        </section>
      `;
    }

    function renderAdminPanel() {
      const visibleClass = state.admin.visible ? "" : "hidden";
      const statusText = state.status === "CLOSED" ? "마감" : "진행 중";
      const statusClass = state.status === "CLOSED" ? "bg-red-100 text-red-600" : "bg-emerald-100 text-emerald-700";
      const votedText = state.votedClassList.length
        ? state.votedClassList.map((num) => `${num}반`).join(", ")
        : "아직 없음";

      return `
        <div class="fixed bottom-4 right-4 z-50">
          <button onclick="toggleAdmin()" class="w-12 h-12 bg-slate-800 text-white rounded-full opacity-40 hover:opacity-100 flex items-center justify-center transition-opacity shadow-lg" aria-label="관리자 메뉴">
            <i class="fa-solid fa-gear text-xl"></i>
          </button>
        </div>

        <aside id="admin-panel" class="${visibleClass} fixed bottom-20 right-4 bg-white border border-slate-200 p-5 rounded-lg shadow-2xl z-50 w-[min(22rem,calc(100vw-2rem))] text-left">
          <div class="flex items-center justify-between gap-3 mb-4">
            <h3 class="font-bold text-lg text-slate-800 flex items-center gap-2"><i class="fa-solid fa-user-tie"></i> 관리자 메뉴</h3>
            <span class="px-2.5 py-1 rounded-full text-xs font-bold ${statusClass}">${statusText}</span>
          </div>

          ${state.admin.unlocked ? `
            <div class="grid grid-cols-2 gap-2 mb-4 text-sm">
              <div class="bg-slate-50 border border-slate-100 rounded-lg p-3">
                <div class="text-slate-400">투표 완료</div>
                <div class="text-xl font-bold text-slate-800">${state.voteCount}/10</div>
              </div>
              <div class="bg-slate-50 border border-slate-100 rounded-lg p-3">
                <div class="text-slate-400">완료 반</div>
                <div class="font-bold text-slate-700 truncate" title="${votedText}">${votedText}</div>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
              ${state.status === "CLOSED" ? `
                <button onclick="adminCommand('open')" ${state.admin.busy ? "disabled" : ""} class="bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white py-3 rounded-lg font-bold transition-colors">
                  <i class="fa-solid fa-lock-open"></i> 다시 열기
                </button>
              ` : `
                <button onclick="adminCommand('close')" ${state.admin.busy ? "disabled" : ""} class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white py-3 rounded-lg font-bold transition-colors">
                  <i class="fa-solid fa-lock"></i> 마감
                </button>
              `}
              <button onclick="adminCommand('dedupe')" ${state.admin.busy ? "disabled" : ""} class="bg-slate-700 hover:bg-slate-800 disabled:opacity-50 text-white py-3 rounded-lg font-bold transition-colors">
                <i class="fa-solid fa-filter-circle-xmark"></i> 중복 정리
              </button>
            </div>

            <button onclick="adminCommand('reset')" ${state.admin.busy ? "disabled" : ""} class="w-full mt-3 bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 py-3 rounded-lg font-bold transition-colors disabled:opacity-50">
              <i class="fa-solid fa-trash-can"></i> 전체 초기화
            </button>
          ` : `
            <label class="block text-sm text-slate-500 mb-2" for="admin-pin">관리자 비밀번호</label>
            <div class="flex gap-2">
              <input id="admin-pin" type="password" inputmode="numeric" autocomplete="off" oninput="updateAdminPin(this.value)" onkeydown="if(event.key === 'Enter') adminUnlock()" class="min-w-0 flex-1 border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="비밀번호">
              <button onclick="adminUnlock()" ${state.admin.busy ? "disabled" : ""} class="px-4 py-2 bg-slate-800 text-white rounded-lg font-bold disabled:opacity-50">확인</button>
            </div>
          `}

          ${state.admin.message ? `<div class="mt-3 text-sm font-bold ${state.admin.message.includes("올바르지") || state.admin.message.includes("오류") || state.admin.message.includes("실패") ? "text-red-600" : "text-emerald-700"}">${state.admin.message}</div>` : ""}
        </aside>
      `;
    }

    init();
  </script>
</body>
</html>
