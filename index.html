<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명지동 창업 아이템 모의 투자 대회</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Jua', sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    .animate-shimmer { animation: shimmer 2s infinite; }
    .bounce-slow { animation: bounce 2s infinite; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20 min-h-screen relative">
  <div id="app"></div>

  <script>
    // 🚨 여기에 앱스 스크립트 배포 후 받은 웹 앱 URL을 붙여넣으세요!
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxduMg1yfs-m06WAOqbI7mTamKN876bNnY3H_mTl9ZTXtYS1iq6YdvDuhH2vE9k0QDJrw/exec"; 
    
    // --- State Management ---
    const state = {
      step: 'intro', // intro, vote, waiting, result
      myClass: null,
      investments: {},
      globalTotals: {},
      loading: false,
      errorMsg: null,
      pollingInterval: null
    };

    const TEAMS = Array.from({length: 10}, (_, i) => ({ id: i + 1, name: `${i + 1}반` }));
    const TOTAL_BUDGET = 10000000;
    const UNIT = 1000000;

    // --- Core Logic ---
    window.formatMoney = (num) => {
      if (num === 0) return "0원";
      return `${(num / 10000).toLocaleString()}만원`;
    };

    window.handleStart = (classNum) => {
      if (!GAS_URL || GAS_URL === "여기에_웹앱_URL을_붙여넣으세요") {
        alert("선생님, HTML 코드 안의 GAS_URL을 먼저 구글 스크립트 주소로 교체해주세요!");
        return;
      }
      state.myClass = classNum;
      state.step = 'vote';
      render();
    };

    window.goBackToIntro = () => {
      state.step = 'intro';
      state.investments = {};
      render();
    };

    window.handleInvest = (teamId, amount) => {
      const current = state.investments[teamId] || 0;
      const newValue = current + amount;
      if (newValue < 0) return; 

      const isNewInvestment = current === 0 && amount > 0;
      const investedTeamsCount = Object.values(state.investments).filter(v => v > 0).length;
      if (isNewInvestment && investedTeamsCount >= 3) return;

      const tempInvestments = { ...state.investments, [teamId]: newValue };
      const totalInvested = Object.values(tempInvestments).reduce((a, b) => a + b, 0);
      if (totalInvested > TOTAL_BUDGET) return;

      state.investments = tempInvestments;
      render();
    };

    window.handleSubmitVote = async () => {
      state.loading = true;
      render();

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'vote',
            myClass: state.myClass,
            investments: state.investments
          })
        });
        
        const result = await response.json();
        if (result.error) {
          alert(result.error); // 투표가 마감되었습니다 등
          state.loading = false;
          render();
          return;
        }

        // 투표 성공 -> 선생님이 종료할 때까지 대기
        state.step = 'waiting';
        startPolling();
      } catch (err) {
        alert("네트워크 오류가 발생했습니다. 다시 시도해주세요.");
      } finally {
        state.loading = false;
        render();
      }
    };

    // 실시간으로 선생님이 투표를 종료했는지 감시
    function startPolling() {
      if (state.pollingInterval) clearInterval(state.pollingInterval);
      
      state.pollingInterval = setInterval(async () => {
        try {
          const response = await fetch(GAS_URL);
          const data = await response.json();
          
          if (data.status === 'CLOSED') {
            clearInterval(state.pollingInterval);
            state.globalTotals = data.totals;
            state.step = 'result';
            render();
          }
        } catch (e) { console.error("Polling Error"); }
      }, 3000); // 3초마다 체크
    }

    // 선생님 관리자 컨트롤
    window.toggleAdmin = () => {
      const p = prompt("관리자 비밀번호를 입력하세요 (기본: 1700)");
      if (p === "1700") {
        document.getElementById('admin-panel').classList.toggle('hidden');
      } else if(p) {
        alert("비밀번호가 틀렸습니다.");
      }
    };

    window.adminCommand = async (cmd) => {
      const confirmMsg = cmd === 'close' ? "투표를 종료하고 결과를 공개하시겠습니까?" : 
                         cmd === 'reset' ? "모든 투표 결과를 초기화(리셋)하시겠습니까? (복구 불가)" : "투표를 다시 시작하시겠습니까?";
      if(!confirm(confirmMsg)) return;

      state.loading = true; render();
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'admin', cmd: cmd })
        });
        alert("처리되었습니다.");
      } catch (e) { alert("오류 발생"); }
      state.loading = false; render();
    }

    // --- Rendering Logic ---
    function render() {
      const appDiv = document.getElementById('app');
      
      if (state.loading) {
        appDiv.innerHTML = `
          <div class="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div class="animate-pulse flex flex-col items-center">
              <i class="fa-solid fa-paper-plane text-5xl mb-4 text-blue-500"></i>
              <h2 class="text-3xl font-bold text-slate-700">전송 중...</h2>
            </div>
          </div>
        `;
        return;
      }

      let html = `
        <header class="bg-gradient-to-r from-blue-500 to-indigo-500 text-white p-6 shadow-md rounded-b-3xl text-center">
          <p class="text-sm md:text-base font-light text-blue-100 mb-1 opacity-90">"내가 살아가는 사회는 어떤 곳인가"</p>
          <h1 class="text-2xl md:text-4xl font-bold drop-shadow-md flex items-center justify-center gap-3">
            <i class="fa-solid fa-wand-magic-sparkles text-yellow-300"></i>
            명지동 창업 아이템 모의 투자 대회
            <i class="fa-solid fa-wand-magic-sparkles text-yellow-300"></i>
          </h1>
        </header>
        <main class="max-w-4xl mx-auto mt-8 px-4">
      `;

      if (state.step === 'intro') html += renderIntro();
      else if (state.step === 'vote') html += renderVote();
      else if (state.step === 'waiting') html += renderWaiting();
      else if (state.step === 'result') html += renderResult();

      html += `</main>`;
      
      // 관리자 패널
      html += `
        <div class="fixed bottom-4 right-4 z-50">
          <button onclick="toggleAdmin()" class="w-10 h-10 bg-slate-200 text-slate-400 rounded-full opacity-50 hover:opacity-100 flex items-center justify-center">
            <i class="fa-solid fa-gear"></i>
          </button>
        </div>
        <div id="admin-panel" class="hidden fixed bottom-16 right-4 bg-white border-2 border-slate-800 p-4 rounded-xl shadow-2xl z-50 w-64">
          <h3 class="font-bold text-lg mb-3">👨‍🏫 선생님 메뉴</h3>
          <button onclick="adminCommand('open')" class="w-full mb-2 bg-green-500 text-white py-2 rounded-lg font-bold">▶️ 투표 시작하기 (Open)</button>
          <button onclick="adminCommand('close')" class="w-full mb-2 bg-blue-600 text-white py-2 rounded-lg font-bold animate-pulse">⏹️ 투표 종료 및 결과발표</button>
          <hr class="my-2 border-slate-200">
          <button onclick="adminCommand('reset')" class="w-full bg-red-500 text-white py-2 rounded-lg font-bold">🗑️ 투표 결과 리셋 (데이터 초기화)</button>
        </div>
      `;

      appDiv.innerHTML = html;
    }

    function renderIntro() {
      let buttonsHtml = '';
      for (let num = 1; num <= 10; num++) {
        buttonsHtml += `<button onclick="handleStart(${num})" class="py-3 bg-slate-100 hover:bg-blue-100 hover:text-blue-600 rounded-xl transition-colors font-bold text-lg shadow-sm border border-slate-200">${num}반</button>`;
      }
      return `
        <div class="bg-white rounded-3xl shadow-xl p-8 text-center animate-fade-in">
          <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-6 drop-shadow-md block"></i>
          <h2 class="text-3xl mb-4 text-slate-700">우리 동네에 꼭 필요한 사업은 무엇일까?</h2>
          <p class="text-lg text-slate-500 mb-8 leading-relaxed">
            명지동을 더 살기 좋은 곳으로 만들 톡톡 튀는 창업 아이템들이 모였습니다.<br/>
            여러분에게는 <strong>1,000만원</strong>의 투자금이 주어집니다.<br/>
            우리 지역사회에 가장 큰 도움이 될 것 같은 <span class="text-blue-500">3개의 반</span>을 골라 자유롭게 투자해주세요!
          </p>
          <div class="max-w-sm mx-auto">
            <label class="block text-left text-lg mb-2 text-slate-600 flex items-center gap-2">
              <i class="fa-solid fa-user"></i> 내 소속 반을 선택해주세요
            </label>
            <div class="grid grid-cols-5 gap-3 mb-6">${buttonsHtml}</div>
          </div>
        </div>
      `;
    }

    function renderVote() {
      const currentTotal = Object.values(state.investments).reduce((a, b) => a + b, 0);
      const remainingBudget = TOTAL_BUDGET - currentTotal;
      const investedAmounts = Object.values(state.investments).filter(v => v > 0);
      const investedTeamsCount = investedAmounts.length;
      const hasUniqueAmounts = new Set(investedAmounts).size === investedTeamsCount;
      const canSubmit = investedTeamsCount === 3 && remainingBudget === 0 && hasUniqueAmounts;
      const isMaxTeamsReached = investedTeamsCount >= 3;

      let teamsHtml = '';
      TEAMS.forEach(team => {
        const isMyClass = team.id === state.myClass;
        const currentInv = state.investments[team.id] || 0;
        const disablePlus = isMyClass || remainingBudget < UNIT || (currentInv === 0 && isMaxTeamsReached);
        const disableMinus = isMyClass || currentInv === 0;

        teamsHtml += `
          <div class="bg-white rounded-3xl p-6 shadow-md border-2 transition-all flex flex-col justify-between 
            ${isMyClass ? 'border-slate-200 opacity-60 bg-slate-50' : 'border-transparent hover:shadow-lg hover:border-blue-200'} 
            ${currentInv > 0 ? 'border-blue-400 bg-blue-50' : ''}">
            <div class="flex justify-between items-start mb-6">
              <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-xl font-bold">${team.id}반</div>
              ${isMyClass ? `<span class="text-red-400 text-sm font-bold flex items-center gap-1"><i class="fa-solid fa-circle-exclamation"></i> 투표불가</span>` : ''}
            </div>
            
            <div class="bg-slate-100 rounded-2xl p-4 flex items-center justify-between mt-auto">
              <button onclick="handleInvest(${team.id}, ${-UNIT})" ${disableMinus ? 'disabled' : ''} class="w-12 h-12 rounded-full bg-white shadow flex items-center justify-center text-3xl font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-30 active:scale-95">-</button>
              <div class="text-center flex-1">
                <span class="text-xs text-slate-400 block mb-1 whitespace-nowrap">나의 투자금</span>
                <span class="text-2xl font-bold whitespace-nowrap ${currentInv > 0 ? 'text-blue-600' : 'text-slate-600'}">${window.formatMoney(currentInv)}</span>
              </div>
              <button onclick="handleInvest(${team.id}, ${UNIT})" ${disablePlus ? 'disabled' : ''} class="w-12 h-12 rounded-full bg-blue-500 shadow flex items-center justify-center text-3xl font-bold text-white hover:bg-blue-600 disabled:opacity-30 active:scale-95">+</button>
            </div>
          </div>
        `;
      });

      const warningHtml = (remainingBudget === 0 && investedTeamsCount === 3 && !hasUniqueAmounts) ? `
        <div class="animate-bounce bg-red-100 border border-red-300 text-red-600 p-3 rounded-xl mt-4 text-center font-bold text-sm md:text-base">
          ⚠️ 순위를 가릴 수 있도록 세 팀의 금액을 모두 다르게 분배해주세요. (예: 500, 300, 200)
        </div>
      ` : '';

      return `
        <div class="animate-fade-in">
          <button onclick="goBackToIntro()" class="text-slate-500 hover:text-blue-600 flex items-center gap-2 mb-6 font-bold transition-colors text-lg"><i class="fa-solid fa-arrow-left"></i> 반 다시 선택하기</button>
          <div class="sticky top-4 z-50 mb-8">
            <div class="glass-panel rounded-3xl shadow-lg border-2 border-blue-200 p-4 px-6 flex flex-col md:flex-row items-center justify-between gap-4">
              <div class="flex items-center gap-3 shrink-0">
                <div class="bg-yellow-100 p-2.5 rounded-full text-center w-12 h-12 flex items-center justify-center"><i class="fa-solid fa-wallet text-xl text-yellow-600"></i></div>
                <div class="text-left">
                  <p class="text-xs text-slate-500 whitespace-nowrap">남은 투자금</p>
                  <p class="text-xl md:text-2xl font-bold whitespace-nowrap ${remainingBudget === 0 ? 'text-green-500' : 'text-blue-600'}">${window.formatMoney(remainingBudget)}</p>
                </div>
              </div>
              
              <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 text-sm md:text-base w-full md:w-auto justify-center">
                <div class="flex items-center gap-1.5 whitespace-nowrap ${investedTeamsCount === 3 ? 'text-green-600' : 'text-slate-400'}"><i class="fa-solid fa-circle-check shrink-0"></i> <span>3팀 선택</span></div>
                <div class="flex items-center gap-1.5 whitespace-nowrap ${remainingBudget === 0 ? 'text-green-600' : 'text-slate-400'}"><i class="fa-solid fa-circle-check shrink-0"></i> <span>전액 사용</span></div>
                <div class="flex items-center gap-1.5 whitespace-nowrap ${(investedTeamsCount > 1 && hasUniqueAmounts) ? 'text-green-600' : 'text-slate-400'}"><i class="fa-solid fa-circle-check shrink-0"></i> <span>차등 분배</span></div>
              </div>

              <button onclick="handleSubmitVote()" ${!canSubmit ? 'disabled' : ''} 
                class="w-full md:w-auto px-6 py-2.5 rounded-full text-lg font-bold transition-all shadow-md flex items-center justify-center gap-2 whitespace-nowrap
                ${canSubmit ? 'bg-gradient-to-r from-blue-500 to-indigo-500 text-white hover:scale-105 active:scale-95 animate-bounce' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}">
                <span>투자 확정하기</span> <i class="fa-solid fa-arrow-right shrink-0"></i>
              </button>
            </div>
            ${warningHtml}
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">${teamsHtml}</div>
        </div>
      `;
    }

    function renderWaiting() {
      return `
        <div class="bg-white rounded-3xl shadow-xl p-10 text-center animate-fade-in mt-10">
          <i class="fa-solid fa-hourglass-half text-6xl text-blue-400 mb-6 bounce-slow inline-block"></i>
          <h2 class="text-3xl font-bold text-slate-800 mb-4">투표가 완료되었습니다!</h2>
          <p class="text-xl text-slate-500 leading-relaxed mb-6">
            친구들이 모두 투표할 때까지 자리에 앉아 기다려주세요.<br/>
            선생님이 투표를 종료하면 <b>이 화면이 자동으로 랭킹 화면으로 바뀝니다!</b>
          </p>
          
          <div class="flex justify-center gap-2 mt-8">
            <span class="w-3 h-3 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 0s"></span>
            <span class="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
            <span class="w-3 h-3 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
          </div>
        </div>
      `;
    }

    function renderResult() {
      const sortedTeams = TEAMS.map(team => ({
        ...team, total: state.globalTotals[team.id] || 0
      })).sort((a, b) => b.total - a.total);

      const maxTotal = Math.max(...Object.values(state.globalTotals).concat([TOTAL_BUDGET]));

      let ranksHtml = '';
      sortedTeams.forEach((team, index) => {
        const percentage = (team.total / (maxTotal || 1)) * 100;
        
        let rankIcon = `<span class="w-8 h-8 flex items-center justify-center bg-slate-200 rounded-full text-slate-600 font-bold">${index + 1}</span>`;
        let cardStyle = "bg-white border border-slate-100 p-4 rounded-2xl shadow-sm mb-4 transition-all";
        let barColor = "bg-gradient-to-r from-blue-400 to-cyan-300";
        let titleColor = "text-lg whitespace-nowrap"; let amtColor = "text-xl text-blue-600";

        if (index === 0) {
          rankIcon = `<i class="fa-solid fa-trophy text-4xl text-yellow-500 drop-shadow-lg"></i>`;
          cardStyle = "bg-gradient-to-br from-yellow-50 to-white border-2 border-yellow-300 p-6 rounded-2xl shadow-lg transform scale-[1.02] z-10 relative mb-6";
          barColor = "bg-gradient-to-r from-yellow-400 to-yellow-200"; titleColor = "text-2xl text-yellow-800"; amtColor = "text-3xl text-yellow-600";
        } else if (index === 1) {
          rankIcon = `<i class="fa-solid fa-trophy text-3xl text-slate-400 drop-shadow"></i>`;
          cardStyle = "bg-gradient-to-br from-slate-50 to-white border-2 border-slate-300 p-5 rounded-2xl shadow-md mb-4";
          barColor = "bg-gradient-to-r from-slate-400 to-slate-200";
        } else if (index === 2) {
          rankIcon = `<i class="fa-solid fa-trophy text-3xl text-amber-600 drop-shadow"></i>`;
          cardStyle = "bg-gradient-to-br from-amber-50 to-white border-2 border-amber-200 p-5 rounded-2xl shadow-md mb-4";
          barColor = "bg-gradient-to-r from-amber-500 to-amber-300";
        }

        ranksHtml += `
          <div class="${cardStyle}">
            <div class="flex items-center gap-4 mb-3">
              <div class="shrink-0 flex items-center justify-center w-10">${rankIcon}</div>
              <div class="flex-1 font-bold text-slate-700 flex justify-between items-center">
                <span class="${titleColor}">${team.id}반</span>
                <span class="font-black whitespace-nowrap ${amtColor}">${window.formatMoney(team.total)}</span>
              </div>
            </div>
            <div class="ml-14 h-4 md:h-6 bg-slate-100 rounded-full overflow-hidden shadow-inner">
              <div class="h-full rounded-full relative overflow-hidden ${barColor}" style="width: ${Math.max(percentage, 1)}%; transition: width 2s ease-out;">
                <div class="absolute inset-0 bg-white/30 -skew-x-12 translate-x-[-100%] animate-shimmer"></div>
              </div>
            </div>
          </div>
        `;
      });

      return `
        <div class="bg-white rounded-3xl shadow-xl p-6 md:p-10 animate-zoom-in">
          <div class="text-center mb-10">
            <div class="relative inline-block">
              <i class="fa-solid fa-arrow-trend-up text-6xl text-blue-500 mb-4 drop-shadow-md animate-pulse"></i>
              <i class="fa-solid fa-wand-magic-sparkles text-2xl text-yellow-400 absolute top-0 right-[-10px] animate-ping"></i>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">🔥 실시간 투자 랭킹 현황 🔥</h2>
            <p class="text-slate-500 text-lg text-green-600 font-bold">투표가 종료되었습니다! 우리 학년의 최종 랭킹입니다.</p>
          </div>
          <div class="space-y-4 relative">${ranksHtml}</div>
        </div>
      `;
    }

    // 첫 실행
    window.onload = render;
  </script>
</body>
</html>
