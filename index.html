<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명지동 창업 모의투자 페스티벌</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles (Gmarket Sans Font & Utilities) -->
    <style>
        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
            font-weight: 900;
            font-style: normal;
        }
        
        body {
            font-family: 'GmarketSans', sans-serif !important;
        }
        .break-keep {
            word-break: keep-all;
        }
    </style>
</head>
<body class="bg-[#FDF8E1] text-slate-900 pb-20 selection:bg-pink-300 min-h-screen">
    
    <!-- Loading Screen -->
    <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center font-black text-2xl text-black">
        <div>🚀 데이터를 불러오고 있어요...</div>
        <div class="text-sm mt-4 text-slate-500 font-medium">* 파이어베이스 서버 연결 대기 중</div>
    </div>

    <!-- Main App (Hidden initially) -->
    <div id="app" class="hidden">
        <!-- Header -->
        <header class="pt-8 pb-6 px-4">
            <div class="max-w-4xl mx-auto text-center space-y-4">
                <span class="inline-block bg-black text-yellow-300 text-sm sm:text-base font-black px-5 py-2 rounded-full border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transform -rotate-3 hover:rotate-0 transition-all">
                    🎯 2학년 프로젝트 목표
                </span>
                <div>
                    <h2 class="text-base sm:text-lg font-bold text-slate-800 bg-white inline-block px-4 py-1.5 rounded-xl border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transform rotate-1">
                        "내가 살아가는 사회는 어떤 곳인가"
                    </h2>
                </div>
                <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-black tracking-tighter mt-4 break-keep">
                    🚀 명지동 창업 <span class="text-purple-600 inline-block transform hover:scale-110 transition-transform cursor-pointer">모의투자</span> 페스티벌!
                </h1>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 py-4" id="main-content">
            <!-- Dynamic Content will be injected here -->
        </main>
    </div>

    <!-- Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, increment, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Initialization ---
        let app, auth, db;
        const appId = 'myeongji-startup-festival'; // 원하는 식별자로 변경 가능
        
        /* 🚨 여기에 파이어베이스 콘솔에서 발급받은 설정값을 붙여넣으세요 🚨 */
        const myActualConfig = {
            // apiKey: "YOUR_API_KEY",
            // authDomain: "YOUR_PROJECT.firebaseapp.com",
            // projectId: "YOUR_PROJECT",
            // storageBucket: "YOUR_PROJECT.appspot.com",
            // messagingSenderId: "YOUR_SENDER_ID",
            // appId: "YOUR_APP_ID"
        };
        
        // (미리보기 모드일 때만 내장 설정 사용, Github 배포 시에는 myActualConfig 사용)
        const activeConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myActualConfig;

        try {
            if (!activeConfig.projectId) {
                 throw new Error("파이어베이스 설정(firebaseConfig)을 코드에 입력해주세요!");
            }
            app = initializeApp(activeConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            console.error("Firebase Init Error:", error);
            document.getElementById('loading-screen').innerHTML = `
                <div class="text-center space-y-4 mx-4 w-full max-w-lg">
                    <div class="text-red-500 font-black text-2xl sm:text-3xl">서버 연결에 실패했어요. 😥</div>
                    <div class="text-sm sm:text-base font-bold text-slate-700 bg-white p-5 rounded-2xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] leading-relaxed text-left inline-block w-full">
                        <p class="mb-3 text-pink-600">이유: ${error.message}</p>
                        <p>index.html 파일 내부에 <code>myActualConfig</code> 설정값이 비어있습니다.</p>
                        <p>파이어베이스 콘솔에서 내 프로젝트 설정값을 복사하여 코드에 붙여넣고 다시 업로드해주세요.</p>
                    </div>
                </div>
            `;
            // 에러 시 이후 스크립트 실행 중단
            throw error; 
        }

        // --- Constants ---
        const TOTAL_BUDGET = 10000000;
        const UNIT = 1000000;
        const MAX_TEAMS = 3;
        const TEAMS_COLLECTION = 'investments_v1';

        const INITIAL_TEAMS = Array.from({ length: 10 }, (_, i) => ({
            id: `class_${i + 1}`,
            name: `2학년 ${i + 1}반 대표 창업팀`,
            shortName: `${i + 1}반`,
            totalInvestment: 0,
            investors: 0
        }));

        // --- State Management ---
        let state = {
            user: null,
            myClass: null,
            hasVoted: false,
            loading: true,
            liveTeams: [...INITIAL_TEAMS],
            allocations: {}, 
            view: 'onboarding', // onboarding, voting, leaderboard
            errorMsg: '',
            isSubmitting: false
        };

        const formatMoney = (amount) => {
            if (amount === 0) return '0원';
            return `${(amount / 10000).toLocaleString()}만 원`;
        };

        // --- Render Functions ---
        const render = () => {
            if (state.loading) {
                document.getElementById('loading-screen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
                return;
            } else {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }

            const main = document.getElementById('main-content');
            
            if (state.view === 'onboarding') {
                main.innerHTML = renderOnboarding();
            } else if (state.view === 'voting' && !state.hasVoted) {
                main.innerHTML = renderVoting();
            } else if (state.view === 'leaderboard') {
                main.innerHTML = renderLeaderboard();
            }
        };

        const renderOnboarding = () => {
            let buttonsHtml = Array.from({ length: 10 }, (_, i) => i + 1).map(num => `
                <button
                    onclick="window.handleClassSelect(${num})"
                    class="py-5 px-2 bg-yellow-100 hover:bg-yellow-300 border-4 border-black rounded-2xl font-black text-2xl text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all active:scale-95 flex flex-col items-center justify-center gap-1"
                >
                    ${num}반
                </button>
            `).join('');

            return `
                <div class="bg-white rounded-3xl border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 sm:p-10 max-w-2xl mx-auto animate-in zoom-in-95 duration-500">
                    <div class="text-center mb-10">
                        <div class="text-7xl mb-4 animate-bounce">🏫</div>
                        <h2 class="text-3xl sm:text-4xl font-black text-black mb-3">안녕! 넌 몇 반이야?</h2>
                        <p class="text-slate-600 font-bold text-lg">
                            공정한 투표를 위해 본인의 반을 먼저 선택해줘!<br/>
                            <span class="text-pink-600">(우리 반 팀에는 투자할 수 없어 🤫)</span>
                        </p>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-4">
                        ${buttonsHtml}
                    </div>
                </div>
            `;
        };

        const renderVoting = () => {
            const allocatedValues = Object.values(state.allocations);
            const allocatedTotal = allocatedValues.reduce((sum, val) => sum + val, 0);
            const remainingBudget = TOTAL_BUDGET - allocatedTotal;
            const selectedTeamsCount = allocatedValues.filter(val => val > 0).length;

            let teamsHtml = INITIAL_TEAMS.filter(team => team.id !== `class_${state.myClass}`).map(team => {
                const currentAllocation = state.allocations[team.id] || 0;
                const isSelected = currentAllocation > 0;
                const cardStyle = isSelected 
                    ? 'shadow-[8px_8px_0px_0px_rgba(236,72,153,1)] scale-[1.02] bg-pink-50 ring-4 ring-pink-400 ring-offset-2' 
                    : 'shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]';
                
                return `
                    <div class="bg-white rounded-3xl border-4 border-black transition-all p-5 sm:p-6 ${cardStyle}">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="inline-block bg-black text-white text-xs sm:text-sm font-black px-3 py-1 rounded-full mb-3 shadow-[2px_2px_0px_0px_rgba(0,0,0,0.3)]">
                                    ${team.shortName}
                                </span>
                                <h3 class="text-xl sm:text-2xl font-black text-black leading-tight">${team.name}</h3>
                            </div>
                            ${isSelected ? '<div class="text-3xl animate-bounce">💖</div>' : ''}
                        </div>
                        
                        <div class="flex items-center justify-between bg-slate-100 p-3 rounded-2xl border-4 border-black shadow-inner">
                            <button 
                                onclick="window.handleAllocate('${team.id}', -${UNIT})"
                                ${currentAllocation === 0 ? 'disabled' : ''}
                                class="w-12 h-12 rounded-xl bg-cyan-400 border-4 border-black text-black flex items-center justify-center hover:bg-cyan-300 disabled:opacity-50 disabled:grayscale transition-all font-black text-3xl shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:scale-90"
                            >
                                -
                            </button>
                            <div class="text-center px-2 flex-1">
                                <div class="text-xs sm:text-sm font-bold text-slate-500 mb-1">투자금액</div>
                                <div class="font-black text-2xl sm:text-3xl ${isSelected ? 'text-pink-600' : 'text-slate-400'}">
                                    ${formatMoney(currentAllocation)}
                                </div>
                            </div>
                            <button 
                                onclick="window.handleAllocate('${team.id}', ${UNIT})"
                                ${remainingBudget === 0 || (currentAllocation === 0 && selectedTeamsCount >= MAX_TEAMS) ? 'disabled' : ''}
                                class="w-12 h-12 rounded-xl bg-pink-400 border-4 border-black text-black flex items-center justify-center hover:bg-pink-300 disabled:opacity-50 disabled:grayscale transition-all font-black text-3xl shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:scale-90"
                            >
                                +
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="space-y-8 animate-in fade-in duration-500">
                    <!-- Dashboard Panel (sticky 해제 및 크기 조정 반영) -->
                    <div class="bg-purple-500 rounded-3xl border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 sm:p-8 text-white transform -rotate-1 mb-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-6">
                            <div class="text-center sm:text-left">
                                <h3 class="text-yellow-300 text-lg font-black mb-1 drop-shadow-sm">나의 투자 지갑 👛 (소속: ${state.myClass}반)</h3>
                                <div class="flex items-end justify-center sm:justify-start gap-2">
                                    <span class="text-4xl sm:text-5xl font-black drop-shadow-md whitespace-nowrap">${formatMoney(remainingBudget)}</span>
                                    <span class="text-purple-200 font-bold mb-1 sm:mb-2 text-xl whitespace-nowrap">남음</span>
                                </div>
                            </div>
                            <div class="flex gap-3 w-full sm:w-auto">
                                <div class="flex-1 flex flex-col items-center justify-center bg-black/20 rounded-2xl p-4 border-2 border-purple-400 text-center min-w-[130px] sm:min-w-[140px]">
                                    <div class="text-xs sm:text-sm text-purple-200 font-bold mb-1 whitespace-nowrap">총 예산 💰</div>
                                    <div class="font-black text-lg sm:text-xl whitespace-nowrap">${formatMoney(TOTAL_BUDGET)}</div>
                                </div>
                                <div class="flex-1 flex flex-col items-center justify-center bg-black/20 rounded-2xl p-4 border-2 border-purple-400 text-center min-w-[130px] sm:min-w-[140px]">
                                    <div class="text-xs sm:text-sm text-purple-200 font-bold mb-1 whitespace-nowrap">선택한 팀 🎯</div>
                                    <div class="font-black text-lg sm:text-xl text-yellow-300 whitespace-nowrap">${selectedTeamsCount} / ${MAX_TEAMS}팀</div>
                                </div>
                            </div>
                        </div>
                        ${state.errorMsg ? `
                        <div class="mt-6 bg-pink-500 text-white border-4 border-black rounded-xl p-3 sm:p-4 text-sm sm:text-base font-bold flex items-center justify-center gap-2 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-pulse">
                            ⚠️ ${state.errorMsg}
                        </div>
                        ` : ''}
                    </div>

                    <!-- Teams Grid -->
                    <div class="grid sm:grid-cols-2 gap-5 sm:gap-6">
                        ${teamsHtml}
                    </div>

                    <!-- Submit Button -->
                    <div class="fixed bottom-4 left-4 right-4 z-50 sm:static sm:mt-10">
                        <div class="max-w-4xl mx-auto">
                            <button
                                onclick="window.submitInvestment()"
                                ${state.isSubmitting ? 'disabled' : ''}
                                class="w-full bg-green-400 hover:bg-green-500 text-black font-black text-xl sm:text-2xl py-5 rounded-2xl border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all active:scale-[0.98] disabled:opacity-70 disabled:cursor-wait flex items-center justify-center gap-3 group"
                            >
                                ${state.isSubmitting ? '🚀 투자 전송 중...' : '🔥 투표 확정하기 (실시간 반영) 🔥'}
                            </button>
                            <p class="text-center font-bold text-slate-500 mt-4 hidden sm:block bg-white/50 py-2 rounded-xl border-2 border-dashed border-slate-300">
                                ⚠️ 투표는 한 번만 가능! 1,000만원을 모두 소진하여 반드시 3팀에 투자해야 해.
                            </p>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderLeaderboard = () => {
            const maxInvestment = state.liveTeams[0]?.totalInvestment || 1;

            let podiumHtml = state.liveTeams.map((team, index) => {
                let rankStyle = "bg-white border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]";
                let rankIcon = `<span class="text-3xl font-black text-slate-400">${index + 1}</span>`;
                let rankTextSize = "text-xl";
                let barColor = 'bg-purple-400';
                
                if (index === 0) {
                    rankStyle = "bg-yellow-300 border-4 border-black ring-4 ring-yellow-400 ring-offset-2 transform scale-[1.02] sm:scale-[1.05] z-10 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]";
                    rankIcon = `<span class="text-5xl drop-shadow-md">👑</span>`;
                    rankTextSize = "text-3xl";
                    barColor = 'bg-pink-400';
                } else if (index === 1) {
                    rankStyle = "bg-slate-200 border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]";
                    rankIcon = `<span class="text-4xl">🥈</span>`;
                    rankTextSize = "text-2xl";
                    barColor = 'bg-cyan-400';
                } else if (index === 2) {
                    rankStyle = "bg-orange-300 border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]";
                    rankIcon = `<span class="text-4xl">🥉</span>`;
                    rankTextSize = "text-2xl";
                    barColor = 'bg-green-400';
                }

                const percentage = Math.max(0, (team.totalInvestment / maxInvestment) * 100);

                return `
                    <div class="rounded-3xl p-5 sm:p-6 flex flex-col sm:flex-row items-center gap-4 transition-all hover:-translate-y-1 ${rankStyle}">
                        <div class="w-16 h-16 sm:w-20 sm:h-20 bg-white border-4 border-black rounded-2xl flex items-center justify-center flex-shrink-0 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                            ${rankIcon}
                        </div>
                        
                        <div class="flex-1 min-w-0 w-full">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 sm:gap-4 mb-3 text-center sm:text-left">
                                <h3 class="font-black text-black truncate ${rankTextSize}">${team.name}</h3>
                                <div class="text-right">
                                    <span class="font-black text-2xl sm:text-4xl text-black tracking-tight drop-shadow-sm">
                                        ${formatMoney(team.totalInvestment)}
                                    </span>
                                </div>
                            </div>
                            
                            <div class="w-full bg-black/10 rounded-full h-4 overflow-hidden border-2 border-black/20">
                                <div class="h-4 rounded-full transition-all duration-1000 ease-out border-r-2 border-black/20 ${barColor}" style="width: ${percentage}%"></div>
                            </div>
                            <div class="text-sm font-bold text-black/60 mt-2 flex items-center justify-center sm:justify-start gap-1">
                                👥 ${team.investors}명의 친구들이 투자함!
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="space-y-8 animate-in zoom-in-95 duration-500">
                    ${!state.hasVoted ? `
                    <div class="flex justify-center sm:justify-end mb-6">
                        <button 
                            onclick="window.changeView('onboarding')"
                            class="bg-white border-4 border-black px-6 py-3 rounded-2xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] font-black text-lg flex items-center gap-2 transition-all active:scale-95"
                        >
                            👈 투표하러 가기
                        </button>
                    </div>
                    ` : ''}

                    ${state.hasVoted ? `
                    <div class="bg-green-400 border-4 border-black text-black rounded-3xl p-6 flex flex-col sm:flex-row items-center justify-center gap-4 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] mb-10 text-center sm:text-left transform -rotate-1">
                        <div class="text-5xl animate-bounce">🎉</div>
                        <div>
                            <h3 class="font-black text-2xl sm:text-3xl mb-1">성공적으로 투자했어!</h3>
                            <p class="font-bold text-black/70 text-lg">이제 실시간으로 순위가 바뀌는 걸 구경해보자 팝콘 준비 🍿</p>
                        </div>
                    </div>
                    ` : ''}

                    <div class="text-center space-y-3 mb-10">
                        <h2 class="text-4xl sm:text-5xl font-black text-black flex items-center justify-center gap-3">
                            <span class="text-5xl">🔥</span> 실시간 랭킹보드 <span class="text-5xl">🔥</span>
                        </h2>
                        <p class="font-bold text-slate-600 text-lg bg-white inline-block px-4 py-1.5 rounded-xl border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transform rotate-1">
                            어느 팀이 가장 높은 투자를 받았을까?
                        </p>
                    </div>

                    <div class="grid gap-5">
                        ${podiumHtml}
                    </div>
                </div>
            `;
        };

        // --- Event Handlers ---
        window.changeView = (viewName) => {
            state.view = viewName;
            state.errorMsg = '';
            render();
        };

        window.handleClassSelect = (classNum) => {
            state.myClass = classNum;
            window.changeView('voting');
        };

        window.handleAllocate = (teamId, amountChange) => {
            state.errorMsg = '';
            const currentAmount = state.allocations[teamId] || 0;
            const newAmount = currentAmount + amountChange;
            
            const allocatedValues = Object.values(state.allocations);
            const allocatedTotal = allocatedValues.reduce((sum, val) => sum + val, 0);
            const remainingBudget = TOTAL_BUDGET - allocatedTotal;
            const selectedTeamsCount = allocatedValues.filter(val => val > 0).length;

            if (newAmount < 0) return;
            if (amountChange > 0 && remainingBudget < amountChange) {
                state.errorMsg = '예산이 부족합니다.';
                render();
                return;
            }
            if (currentAmount === 0 && amountChange > 0 && selectedTeamsCount >= MAX_TEAMS) {
                state.errorMsg = '최대 3팀까지만 투자할 수 있습니다.';
                render();
                return;
            }

            state.allocations[teamId] = newAmount;
            if (state.allocations[teamId] === 0) {
                delete state.allocations[teamId];
            }
            render();
        };

        window.submitInvestment = async () => {
            const allocatedValues = Object.values(state.allocations);
            const allocatedTotal = allocatedValues.reduce((sum, val) => sum + val, 0);
            const remainingBudget = TOTAL_BUDGET - allocatedTotal;
            const selectedTeamsCount = allocatedValues.filter(val => val > 0).length;

            if (remainingBudget > 0) {
                state.errorMsg = '1,000만 원의 투자금을 모두 사용해야 합니다.';
                render();
                return;
            }
            if (selectedTeamsCount !== MAX_TEAMS) {
                state.errorMsg = '반드시 3팀에게 투자해주세요.';
                render();
                return;
            }

            state.isSubmitting = true;
            render();

            try {
                // 사용자가 투표를 마쳤는지 저장 (중복 투표 방지)
                const voteRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'vote_status', 'status');
                await setDoc(voteRef, { 
                    voted: true, 
                    myClass: state.myClass, 
                    timestamp: new Date().toISOString(),
                    allocations: state.allocations 
                });

                // 팀별 누적 투자금액 업데이트
                const promises = Object.entries(state.allocations).map(([teamId, amount]) => {
                    const teamRef = doc(db, 'artifacts', appId, 'public', 'data', TEAMS_COLLECTION, teamId);
                    return setDoc(teamRef, {
                        totalInvestment: increment(amount),
                        investors: increment(1)
                    }, { merge: true });
                });

                await Promise.all(promises);
                
                state.hasVoted = true;
                state.view = 'leaderboard';
            } catch (err) {
                console.error("Submit Error:", err);
                state.errorMsg = '투표 처리 중 오류가 발생했습니다. 다시 시도해주세요.';
            }
            
            state.isSubmitting = false;
            render();
        };

        // --- Initialization ---
        const init = async () => {
            try {
                // 익명 로그인 (학생들 로그인 없이 스마트폰별 고유 ID 부여)
                // 만약 이 환경이 Canvas 미리보기 환경이면 커스텀 토큰 사용
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    // eslint-disable-next-line no-undef
                    const { signInWithCustomToken } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
                document.getElementById('loading-screen').innerHTML = '<div class="text-red-500 font-bold">인증에 실패했어요. 파이어베이스 인증(Authentication) 설정에서 익명 로그인을 켰는지 확인해주세요!</div>';
                return;
            }

            onAuthStateChanged(auth, async (currentUser) => {
                state.user = currentUser;
                if (currentUser) {
                    try {
                        const voteRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'vote_status', 'status');
                        const voteSnap = await getDoc(voteRef);
                        if (voteSnap.exists()) {
                            state.hasVoted = true;
                            state.myClass = voteSnap.data().myClass;
                            state.view = 'leaderboard';
                        }
                    } catch (e) {
                        console.error("Check Vote Error:", e);
                    }

                    // 실시간 데이터 감시 (Realtime listener)
                    try {
                        const q = collection(db, 'artifacts', appId, 'public', 'data', TEAMS_COLLECTION);
                        onSnapshot(q, (snapshot) => {
                            const dbData = {};
                            snapshot.forEach(doc => {
                                dbData[doc.id] = doc.data();
                            });

                            const merged = INITIAL_TEAMS.map(team => ({
                                ...team,
                                totalInvestment: dbData[team.id]?.totalInvestment || 0,
                                investors: dbData[team.id]?.investors || 0
                            }));

                            merged.sort((a, b) => b.totalInvestment - a.totalInvestment);
                            state.liveTeams = merged;
                            
                            if (state.view === 'leaderboard') render();
                        }, (error) => {
                            console.error("Firestore Listen Error:", error);
                        });
                    } catch (e) {
                         console.error("Listen Setup Error:", e);
                    }
                }
                
                state.loading = false;
                render();
            });
        };

        init();

    </script>
</body>
</html>
