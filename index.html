<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명지동 창업 아이템 모의 투자 대회</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Jua -->
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: 'Jua', sans-serif;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    .animate-shimmer {
      animation: shimmer 2s infinite;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20 min-h-screen">
  
  <div id="app"></div>

  <!-- Firebase & App Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- State Management ---
    const state = {
      user: null,
      step: 'intro', // 'intro', 'vote', 'result'
      myClass: null,
      investments: {},
      globalTotals: {},
      loading: true,
      errorMsg: null
    };

    const TEAMS = Array.from({length: 10}, (_, i) => ({ id: i + 1, name: `${i + 1}반` }));
    const TOTAL_BUDGET = 10000000;
    const UNIT = 1000000;

    // --- Firebase Initialization ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const app = Object.keys(firebaseConfig).length > 0 ? initializeApp(firebaseConfig) : null;
    const auth = app ? getAuth(app) : null;
    const db = app ? getFirestore(app) : null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'myeongji-startup-app';

    let snapshotUnsubscribe = null;

    async function initAuth() {
      if (!auth) {
        state.loading = false;
        render();
        return;
      }
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Auth Error:", err);
      }
    }

    if (auth) {
      onAuthStateChanged(auth, async (currentUser) => {
        state.user = currentUser;
        if (currentUser && db) {
          try {
            const voteDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'investments', currentUser.uid));
            if (voteDoc.exists()) {
              state.myClass = voteDoc.data().myClass;
              state.investments = voteDoc.data().investments;
              state.step = 'result';
            }
          } catch(e) {
            console.error(e);
          }
          setupSnapshot();
        }
        state.loading = false;
        render();
      });
      initAuth();
    } else {
      state.loading = false;
      render();
    }

    function setupSnapshot() {
      if (!db || snapshotUnsubscribe) return;
      const investmentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'investments');
      snapshotUnsubscribe = onSnapshot(investmentsRef, (snapshot) => {
        const totals = {};
        snapshot.docs.forEach(d => {
          const data = d.data().investments;
          if (data) {
            Object.keys(data).forEach(teamId => {
              totals[teamId] = (totals[teamId] || 0) + data[teamId];
            });
          }
        });
        state.globalTotals = totals;
        if (state.step === 'result') render();
      }, (error) => {
        console.error("Snapshot error:", error);
      });
    }

    // --- Global Handlers ---
    window.formatMoney = (num) => {
      if (num === 0) return "0원";
      return `${(num / 10000).toLocaleString()}만원`;
    };

    window.handleStart = (classNum) => {
      state.myClass = classNum;
      state.step = 'vote';
      render();
    };

    window.goBackToIntro = () => {
      state.step = 'intro';
      state.investments = {};
      render();
    };

    window.goToEdit = () => {
      state.step = 'vote';
      render();
    };

    window.handleInvest = (teamId, amount) => {
      const current = state.investments[teamId] || 0;
      const newValue = current + amount;
      
      if (newValue < 0) return; // 마이너스 방지

      // 3팀 초과 방지
      const isNewInvestment = current === 0 && amount > 0;
      const investedTeamsCount = Object.values(state.investments).filter(v => v > 0).length;
      if (isNewInvestment && investedTeamsCount >= 3) return;

      // 예산 초과 방지
      const tempInvestments = { ...state.investments, [teamId]: newValue };
      const totalInvested = Object.values(tempInvestments).reduce((a, b) => a + b, 0);
      if (totalInvested > TOTAL_BUDGET) return;

      state.investments = tempInvestments;
      render();
    };

    window.handleSubmitVote = async () => {
      if (!state.user || !db) return;
      state.loading = true;
      state.errorMsg = null;
      render();

      try {
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'investments', state.user.uid), {
          myClass: state.myClass,
          investments: state.investments,
          timestamp: new Date().toISOString()
        });
        state.step = 'result';
      } catch (err) {
        console.error("Save Error:", err);
        state.errorMsg = "투표 저장 중 오류가 발생했습니다.";
      } finally {
        state.loading = false;
        render();
      }
    };

    // --- Rendering Logic ---
    function render() {
      const appDiv = document.getElementById('app');
      
      if (state.loading) {
        appDiv.innerHTML = `
          <div class="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div class="animate-pulse flex flex-col items-center">
              <i class="fa-solid fa-wand-magic-sparkles text-5xl mb-4 text-yellow-400"></i>
              <h2 class="text-4xl font-bold text-blue-600 drop-shadow-sm">로딩중입니다... ✨</h2>
            </div>
          </div>
        `;
        return;
      }

      let html = `
        <header class="bg-gradient-to-r from-blue-500 to-indigo-500 text-white p-6 shadow-md rounded-b-3xl text-center">
          <p class="text-sm md:text-base font-light text-blue-100 mb-1 opacity-90">"내가 살아가는 사회는 어떤 곳인가"</p>
          <h1 class="text-2xl md:text-4xl font-bold drop-shadow-md flex items-center justify-center gap-3">
            <i class="fa-solid fa-wand-magic-sparkles text-yellow-300"></i>
            명지동 창업 아이템 모의 투자 대회
            <i class="fa-solid fa-wand-magic-sparkles text-yellow-300"></i>
          </h1>
        </header>
        <main class="max-w-4xl mx-auto mt-8 px-4">
      `;

      if (state.step === 'intro') {
        html += renderIntro();
      } else if (state.step === 'vote') {
        html += renderVote();
      } else if (state.step === 'result') {
        html += renderResult();
      }

      html += `</main>`;
      appDiv.innerHTML = html;
    }

    function renderIntro() {
      let buttonsHtml = '';
      for (let num = 1; num <= 10; num++) {
        buttonsHtml += `
          <button onclick="handleStart(${num})" class="py-3 bg-slate-100 hover:bg-blue-100 hover:text-blue-600 rounded-xl transition-colors font-bold text-lg shadow-sm border border-slate-200">
            ${num}반
          </button>
        `;
      }

      return `
        <div class="bg-white rounded-3xl shadow-xl p-8 text-center animate-fade-in">
          <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-6 drop-shadow-md block"></i>
          <h2 class="text-3xl mb-4 text-slate-700">우리 동네에 꼭 필요한 사업은 무엇일까?</h2>
          <p class="text-lg text-slate-500 mb-8 leading-relaxed">
            명지동을 더 살기 좋은 곳으로 만들 톡톡 튀는 창업 아이템들이 모였습니다.<br/>
            여러분에게는 <strong>1,000만원</strong>의 투자금이 주어집니다.<br/>
            우리 지역사회에 가장 큰 도움이 될 것 같은 <span class="text-blue-500">3개의 반</span>을 골라 자유롭게 투자해주세요!
          </p>
          <div class="max-w-sm mx-auto">
            <label class="block text-left text-lg mb-2 text-slate-600 flex items-center gap-2">
              <i class="fa-solid fa-user"></i> 내 소속 반을 선택해주세요
            </label>
            <div class="grid grid-cols-5 gap-3 mb-6">
              ${buttonsHtml}
            </div>
          </div>
        </div>
      `;
    }

    function renderVote() {
      const currentTotal = Object.values(state.investments).reduce((a, b) => a + b, 0);
      const remainingBudget = TOTAL_BUDGET - currentTotal;
      const investedAmounts = Object.values(state.investments).filter(v => v > 0);
      const investedTeamsCount = investedAmounts.length;
      const hasUniqueAmounts = new Set(investedAmounts).size === investedTeamsCount;
      const canSubmit = investedTeamsCount === 3 && remainingBudget === 0 && hasUniqueAmounts;
      const isMaxTeamsReached = investedTeamsCount >= 3;

      let teamsHtml = '';
      TEAMS.forEach(team => {
        const isMyClass = team.id === state.myClass;
        const currentInv = state.investments[team.id] || 0;
        const disablePlus = isMyClass || remainingBudget < UNIT || (currentInv === 0 && isMaxTeamsReached);
        const disableMinus = isMyClass || currentInv === 0;

        teamsHtml += `
          <div class="bg-white rounded-3xl p-6 shadow-md border-2 transition-all flex flex-col justify-between 
            ${isMyClass ? 'border-slate-200 opacity-60 bg-slate-50' : 'border-transparent hover:shadow-lg hover:border-blue-200'} 
            ${currentInv > 0 ? 'border-blue-400 bg-blue-50' : ''}">
            <div class="flex justify-between items-start mb-6">
              <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-xl font-bold">
                ${team.id}반
              </div>
              ${isMyClass ? `<span class="text-red-400 text-sm font-bold flex items-center gap-1"><i class="fa-solid fa-circle-exclamation"></i> 투표불가</span>` : ''}
            </div>
            
            <div class="bg-slate-100 rounded-2xl p-4 flex items-center justify-between mt-auto">
              <button onclick="handleInvest(${team.id}, ${-UNIT})" ${disableMinus ? 'disabled' : ''} class="w-12 h-12 rounded-full bg-white shadow flex items-center justify-center text-3xl font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-30 transition-transform active:scale-95">
                -
              </button>
              <div class="text-center flex-1">
                <span class="text-xs text-slate-400 block mb-1 whitespace-nowrap">나의 투자금</span>
                <span class="text-2xl font-bold whitespace-nowrap ${currentInv > 0 ? 'text-blue-600' : 'text-slate-600'}">
                  ${window.formatMoney(currentInv)}
                </span>
              </div>
              <button onclick="handleInvest(${team.id}, ${UNIT})" ${disablePlus ? 'disabled' : ''} class="w-12 h-12 rounded-full bg-blue-500 shadow flex items-center justify-center text-3xl font-bold text-white hover:bg-blue-600 disabled:opacity-30 transition-transform active:scale-95">
                +
              </button>
            </div>
          </div>
        `;
      });

      const warningHtml = (remainingBudget === 0 && investedTeamsCount === 3 && !hasUniqueAmounts) ? `
        <div class="animate-bounce bg-red-100 border border-red-300 text-red-600 p-3 rounded-xl mt-4 text-center font-bold text-sm md:text-base">
          ⚠️ 투자 금액이 동일한 팀이 있습니다! 순위를 가릴 수 있도록 금액을 다르게 분배해주세요. (예: 500, 300, 200)
        </div>
      ` : '';
      
      const errorHtml = state.errorMsg ? `
        <div class="bg-red-100 text-red-600 p-3 rounded-xl mt-4 text-center font-bold">
          ${state.errorMsg}
        </div>
      ` : '';

      return `
        <div class="animate-fade-in">
          <button onclick="goBackToIntro()" class="text-slate-500 hover:text-blue-600 flex items-center gap-2 mb-6 font-bold transition-colors text-lg">
            <i class="fa-solid fa-arrow-left"></i> 반 다시 선택하기
          </button>

          <div class="sticky top-4 z-50 mb-8">
            <div class="glass-panel rounded-3xl shadow-lg border-2 border-blue-200 p-4 px-6 flex flex-col md:flex-row items-center justify-between gap-4">
              <div class="flex items-center gap-3 shrink-0">
                <div class="bg-yellow-100 p-2.5 rounded-full text-center w-12 h-12 flex items-center justify-center">
                  <i class="fa-solid fa-wallet text-xl text-yellow-600"></i>
                </div>
                <div class="text-left">
                  <p class="text-xs text-slate-500 whitespace-nowrap">남은 투자금</p>
                  <p class="text-xl md:text-2xl font-bold whitespace-nowrap ${remainingBudget === 0 ? 'text-green-500' : 'text-blue-600'}">
                    ${window.formatMoney(remainingBudget)}
                  </p>
                </div>
              </div>
              
              <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 text-sm md:text-base w-full md:w-auto justify-center">
                <div class="flex items-center gap-1.5 whitespace-nowrap ${investedTeamsCount === 3 ? 'text-green-600' : 'text-slate-400'}">
                  <i class="fa-solid fa-circle-check shrink-0"></i> 
                  <span>3팀 선택 (${investedTeamsCount}/3)</span>
                </div>
                <div class="flex items-center gap-1.5 whitespace-nowrap ${remainingBudget === 0 ? 'text-green-600' : 'text-slate-400'}">
                  <i class="fa-solid fa-circle-check shrink-0"></i> 
                  <span>1000만원 모두 사용</span>
                </div>
                <div class="flex items-center gap-1.5 whitespace-nowrap ${(investedTeamsCount > 1 && hasUniqueAmounts) ? 'text-green-600' : 'text-slate-400'}">
                  <i class="fa-solid fa-circle-check shrink-0"></i> 
                  <span>금액 차등 분배</span>
                </div>
              </div>

              <button onclick="handleSubmitVote()" ${!canSubmit ? 'disabled' : ''} 
                class="w-full md:w-auto px-6 py-2.5 rounded-full text-lg font-bold transition-all shadow-md flex items-center justify-center gap-2 whitespace-nowrap
                ${canSubmit ? 'bg-gradient-to-r from-blue-500 to-indigo-500 text-white hover:scale-105 active:scale-95 animate-bounce' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}">
                <span>투자 확정하기</span> <i class="fa-solid fa-arrow-right shrink-0"></i>
              </button>
            </div>
            ${warningHtml}
            ${errorHtml}
          </div>

          <div class="bg-yellow-50 border border-yellow-200 text-yellow-700 p-4 rounded-2xl mb-8 flex items-start gap-3 shadow-sm">
            <i class="fa-solid fa-circle-exclamation text-xl mt-1 shrink-0"></i>
            <p class="text-base md:text-lg">
              <strong>${state.myClass}반</strong> 소속이시군요! 본인 반에는 투자할 수 없습니다.<br/>
              100만원 단위로 분배하여 <strong>정확히 3팀</strong>에게 1,000만원을 투자하되, 1/2/3등을 가릴 수 있도록 <strong>세 팀의 투자 금액은 모두 다르게</strong> 설정해주세요.
            </p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            ${teamsHtml}
          </div>
        </div>
      `;
    }

    function renderResult() {
      const sortedTeams = TEAMS.map(team => ({
        ...team,
        total: state.globalTotals[team.id] || 0
      })).sort((a, b) => b.total - a.total);

      const maxTotal = Math.max(...Object.values(state.globalTotals).concat([TOTAL_BUDGET]));

      let ranksHtml = '';
      sortedTeams.forEach((team, index) => {
        const percentage = (team.total / (maxTotal || 1)) * 100;
        
        let rankIcon = `<span class="w-8 h-8 flex items-center justify-center bg-slate-200 rounded-full text-slate-600 font-bold">${index + 1}</span>`;
        let cardStyle = "bg-white border border-slate-100 p-4 rounded-2xl shadow-sm hover:shadow-md transition-all mb-4";
        let barColor = "bg-gradient-to-r from-blue-400 to-cyan-300";
        let titleColor = "text-lg whitespace-nowrap";
        let amtColor = "text-xl text-blue-600";

        if (index === 0) {
          rankIcon = `<i class="fa-solid fa-trophy text-4xl text-yellow-500 drop-shadow-lg"></i>`;
          cardStyle = "bg-gradient-to-br from-yellow-50 to-white border-2 border-yellow-300 p-6 rounded-2xl shadow-lg shadow-yellow-100/50 transform scale-[1.02] z-10 relative mb-6";
          barColor = "bg-gradient-to-r from-yellow-400 to-yellow-200";
          titleColor = "text-2xl text-yellow-800 whitespace-nowrap";
          amtColor = "text-3xl text-yellow-600";
        } else if (index === 1) {
          rankIcon = `<i class="fa-solid fa-trophy text-3xl text-slate-400 drop-shadow"></i>`;
          cardStyle = "bg-gradient-to-br from-slate-50 to-white border-2 border-slate-300 p-5 rounded-2xl shadow-md mb-4";
          barColor = "bg-gradient-to-r from-slate-400 to-slate-200";
        } else if (index === 2) {
          rankIcon = `<i class="fa-solid fa-trophy text-3xl text-amber-600 drop-shadow"></i>`;
          cardStyle = "bg-gradient-to-br from-amber-50 to-white border-2 border-amber-200 p-5 rounded-2xl shadow-md mb-4";
          barColor = "bg-gradient-to-r from-amber-500 to-amber-300";
        }

        ranksHtml += `
          <div class="${cardStyle}" style="transition-duration: 800ms">
            <div class="flex items-center gap-4 mb-3">
              <div class="shrink-0 flex items-center justify-center w-10">
                ${rankIcon}
              </div>
              <div class="flex-1 font-bold text-slate-700 flex justify-between items-center">
                <span class="${titleColor}">${team.id}반</span>
                <div class="text-right">
                  <span class="font-black whitespace-nowrap ${amtColor}">${window.formatMoney(team.total)}</span>
                </div>
              </div>
            </div>
            <div class="ml-14 h-4 md:h-6 bg-slate-100 rounded-full overflow-hidden shadow-inner">
              <div class="h-full rounded-full transition-all duration-1000 ease-out relative overflow-hidden ${barColor}" style="width: ${Math.max(percentage, 1)}%">
                <div class="absolute top-0 left-0 right-0 bottom-0 bg-white/30 -skew-x-12 translate-x-[-100%] animate-shimmer"></div>
              </div>
            </div>
          </div>
        `;
      });

      let myInvestmentsHtml = '';
      Object.entries(state.investments).filter(([_, amount]) => amount > 0).forEach(([classId, amount]) => {
        myInvestmentsHtml += `
          <span class="bg-white px-4 py-2 rounded-full shadow-sm text-slate-700 font-bold border border-blue-100 whitespace-nowrap">
            ${classId}반 : <span class="text-blue-600">${window.formatMoney(amount)}</span>
          </span>
        `;
      });

      return `
        <div class="bg-white rounded-3xl shadow-xl p-6 md:p-10 animate-zoom-in">
          <div class="text-center mb-10">
            <div class="relative inline-block">
              <i class="fa-solid fa-arrow-trend-up text-6xl text-blue-500 mb-4 drop-shadow-md animate-pulse"></i>
              <i class="fa-solid fa-wand-magic-sparkles text-2xl text-yellow-400 absolute top-0 right-[-10px] animate-ping"></i>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">🔥 실시간 투자 랭킹 현황 🔥</h2>
            <p class="text-slate-500">우리 학년 친구들의 투자가 실시간으로 반영되고 있어요!</p>
          </div>

          <div class="space-y-4 relative">
            ${ranksHtml}
          </div>

          <div class="mt-12 bg-blue-50 text-blue-700 p-6 rounded-2xl text-center shadow-inner">
            <i class="fa-solid fa-coins text-4xl mb-2 text-yellow-500 block text-center"></i>
            <p class="text-xl whitespace-nowrap">내가 투자한 내역</p>
            <div class="mt-4 flex flex-wrap justify-center gap-3">
              ${myInvestmentsHtml}
            </div>
          </div>

          <div class="mt-8 text-center">
            <button onclick="goToEdit()" class="inline-flex items-center gap-2 px-6 py-3 bg-white border-2 border-slate-200 rounded-full text-slate-600 font-bold hover:bg-slate-50 hover:text-blue-600 transition-colors shadow-sm">
              <i class="fa-solid fa-pen-to-square"></i> 내 투표 수정하기
            </button>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
